name: Deploy alerts
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'sandbox'
    paths:
      - '.nais/alerts.yml'

jobs:
  deploy-alerts-dev:
    name: Deploy dev alerts
    permissions:
      contents: read
      id-token: write
    if: github.ref == 'refs/heads/sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Deploy alerts
        uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/alerts.yml,.nais/alerts-q1.yml
  deploy-alerts-prod:
    name: Deploy prod alerts
    permissions:
      contents: read
      id-token: write
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Deploy alerts
        uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/alerts.yml
