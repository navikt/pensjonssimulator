name: Deploy alerts
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'sandbox'
    paths:
      - '.nais/alerts.yml'

jobs:
  deploy-alerts-dev:
    name: Deploy dev alerts
    permissions:
      contents: read
      id-token: write
    if: github.ref == 'refs/heads/sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Deploy alerts
        uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb # v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/alerts.yml,.nais/alerts-q1.yml
  deploy-alerts-prod:
    name: Deploy prod alerts
    permissions:
      contents: read
      id-token: write
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Deploy alerts
        uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb # v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/alerts.yml
