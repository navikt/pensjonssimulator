name: 'Merge Main to Sandbox'

on:
  push:
    branches:
      - main
  workflow_call:

jobs:
  mergeMainToSandbox:
    permissions:
      contents: "write"
      checks: "write"
      id-token: "write"
      packages: "write"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 20
      - name: Merge Main to Sandbox
        uses: robotology/gh-action-nightly-merge@81570ba03dd370f582bd3f52d47672d29191829f # v1.5.2
        with:
          stable_branch: 'main'
          development_branch: 'sandbox'
          allow_ff: true
          allow_forks: true
          user_name: GitHub Merge Actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  call-buildAndDeploySandbox:
    needs: mergeMainToSandbox
    permissions:
      actions: "read"
      contents: "write"
      checks: "write"
      id-token: "write"
      packages: "write"
      security-events: "write"
    secrets: inherit
    uses: ./.github/workflows/deploy-dev.yaml
