name: 'Kjør end to end tester i Sandbox'

on:
  workflow_dispatch:
  workflow_call:

jobs:
  runIntegrationTests:
    permissions:
      contents: "write"
      checks: "write"
      id-token: "write"
      packages: "write"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          cache: gradle
          java-version: 25
          distribution: temurin
      - name: Change wrapper permissions
        working-directory: end-to-end-test
        run: chmod +x ./gradlew
      - name: Build
        working-directory: end-to-end-test
        run: ./gradlew clean build
      - name: Build Docker image
        id: docker-build-push
        uses: nais/docker-build-push@45d352fb62fb52ccb5ff6cba22c047fa02b35321 # v0
        with:
          dockerfile: .docker/Dockerfile-EndToEndTest
          team: pensjonskalkulator
          image_suffix: end-to-end
      - name: deploy to Nais
        id: docker-deploy
        uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
            CLUSTER: dev-gcp
            IMAGE: ${{ steps.docker-build-push.outputs.image }}
            RESOURCE: .nais/run-end-to-end-test-dev.yml