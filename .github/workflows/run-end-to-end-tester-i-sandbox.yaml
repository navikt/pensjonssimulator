name: 'Kjør end to end tester i Sandbox'

on:
  workflow_dispatch:
  workflow_call:

jobs:
  runIntegrationTests:
    permissions:
      contents: "write"
      checks: "write"
      id-token: "write"
      packages: "write"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          cache: gradle
          java-version: 25
          distribution: temurin
      - name: Change wrapper permissions
        working-directory: end-to-end-test
        run: chmod +x ./gradlew
      - name: Build
        working-directory: end-to-end-test
        run: ./gradlew clean build
      - name: Build Docker image
        id: docker-build-push
        uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c # v0
        with:
          dockerfile: .docker/Dockerfile-EndToEndTest
          team: pensjonskalkulator
          image_suffix: end-to-end
      - name: deploy to Nais
        id: docker-deploy
        uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb # v2
        env:
            CLUSTER: dev-gcp
            IMAGE: ${{ steps.docker-build-push.outputs.image }}
            RESOURCE: .nais/run-end-to-end-test-dev.yml