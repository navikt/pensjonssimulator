name: 'Kjør end to end tester i Sandbox'

on:
  workflow_dispatch:
  workflow_call:

jobs:
  runIntegrationTests:
    permissions:
      contents: "write"
      checks: "write"
      id-token: "write"
      packages: "write"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          cache: gradle
          java-version: 25
          distribution: temurin
      - name: Change wrapper permissions
        working-directory: end-to-end-test
        run: chmod +x ./gradlew
      - name: Build
        working-directory: end-to-end-test
        run: ./gradlew clean build
      - name: Build Docker image
        id: docker-build-push
        uses: nais/docker-build-push@f8bc7437f7549c2b08197152d781b98f8727a08a # v0
        with:
          dockerfile: .docker/Dockerfile-EndToEndTest
          team: pensjonskalkulator
          image_suffix: end-to-end
      - name: deploy to Nais
        id: docker-deploy
        uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
            CLUSTER: dev-gcp
            IMAGE: ${{ steps.docker-build-push.outputs.image }}
            RESOURCE: .nais/run-end-to-end-test-dev.yml